# ─────────────────────────────────────────────────────────────────────────────
# Deploy to GitHub Pages
#
# Trigger : every push to `main`  (or manual dispatch via Actions UI)
# Strategy: official GitHub Pages Actions — no third-party dependencies,
#            no gh-pages branch required.
#
# Required repo setting (one-time):
#   Settings → Pages → Source → GitHub Actions
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Job 1: Build ─────────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check and build
        run: npm run build
        # vite.config.ts already sets base: '/ai-math-knowledge-graph/'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload dist/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # ── Job 2: Deploy ─────────────────────────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
